<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Party — Комната</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<!-- HLS.js for .m3u8 streams -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #14141f;
    --border: rgba(255,255,255,0.07);
    --accent: #e8ff47;
    --accent2: #ff4f7b;
    --text: #e8e8f0;
    --muted: #6a6a80;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,8,16,0.8);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.04em;
  }
  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .viewers-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
  }
  .viewers-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .share-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    background: var(--accent);
    color: #080810;
    border: none;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .share-btn:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(232,255,71,0.3); }
  .share-btn.copied { background: #4f8fff; }

  /* ── Main layout ───────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
    height: calc(100vh - 57px);
  }

  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  }

  /* ── Video area ────────────────────────────────── */
  .video-section {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .video-wrapper {
    position: relative;
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 0; /* важно для flex: не даёт расти за пределы родителя */
  }

  video {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  /* Sync overlay */
  .sync-overlay {
    position: absolute;
    inset: 0;
    background: rgba(8,8,16,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 10;
  }
  .sync-overlay.show { opacity: 1; pointer-events: all; }
  .sync-spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(232,255,71,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-text { font-size: 14px; color: var(--muted); }

  /* Pause overlay */
  .pause-toast {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(8,8,16,0.85);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 32px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 20;
    pointer-events: none;
  }
  .pause-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .pause-toast-icon { font-size: 32px; }
  .pause-toast-text { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* ── Info bar ──────────────────────────────────── */
  .info-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }
  .stream-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .stream-url {
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  /* ── Sidebar ───────────────────────────────────── */
  .sidebar {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* Room ID */
  .room-id-display {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 20px;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-align: center;
    margin-bottom: 10px;
  }

  .room-link-row {
    display: flex;
    gap: 8px;
  }
  .room-link-input {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: text;
    outline: none;
  }
  .copy-link-btn {
    padding: 8px 12px;
    background: rgba(232,255,71,0.1);
    border: 1px solid rgba(232,255,71,0.2);
    border-radius: 8px;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .copy-link-btn:hover { background: rgba(232,255,71,0.2); }

  /* Status log */
  .event-log {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 280px;
    overflow-y: auto;
  }
  .event-log::-webkit-scrollbar { width: 3px; }
  .event-log::-webkit-scrollbar-track { background: transparent; }
  .event-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .event-icon { font-size: 14px; flex-shrink: 0; }
  .event-content { flex: 1; }
  .event-text { font-size: 12px; color: var(--text); }
  .event-time { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .conn-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    transition: all 0.3s;
  }
  .conn-status.connected { background: rgba(71,255,150,0.06); color: #47ff96; }
  .conn-status.disconnected { background: rgba(255,79,123,0.06); color: var(--accent2); }
  .conn-status.connecting { background: rgba(232,255,71,0.06); color: var(--accent); }
  .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  /* ── Chat ── */
  .chat-section { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 0; }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stab {
    flex: 1; padding: 10px 6px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.05em;
    color: var(--muted); background: none;
    border: none; border-bottom: 2px solid transparent;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .stab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .stab-panel { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .stab-panel.active { display: flex; }

  /* Messages list */
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 10px 14px;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 0;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-msg { display: flex; flex-direction: column; gap: 2px; animation: slideIn 0.15s ease; }
  .chat-msg.own { align-items: flex-end; }

  .chat-msg-meta {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--muted);
  }
  .chat-msg.own .chat-msg-meta { flex-direction: row-reverse; }

  .chat-name { font-weight: 500; color: var(--text); }

  .chat-bubble {
    max-width: 85%; padding: 7px 11px;
    border-radius: 12px; font-size: 12px; line-height: 1.45;
    word-break: break-word;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .chat-msg.own .chat-bubble {
    background: rgba(232,255,71,0.1);
    border-color: rgba(232,255,71,0.2);
    color: var(--text);
  }

  .chat-system {
    text-align: center; font-size: 11px;
    color: var(--muted); padding: 2px 0;
  }

  /* Input row */
  .chat-input-row {
    display: flex; gap: 6px; padding: 10px 12px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .chat-input {
    flex: 1; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 11px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  .chat-send {
    width: 34px; height: 34px; flex-shrink: 0;
    background: var(--accent); color: #080810;
    border: none; border-radius: 8px;
    font-size: 16px; cursor: pointer;
    transition: all 0.15s; display: flex;
    align-items: center; justify-content: center;
  }
  .chat-send:hover { box-shadow: 0 3px 12px rgba(232,255,71,0.35); }
  .chat-send:active { transform: scale(0.94); }

  /* Event log inside stab */
  #stab-events { padding: 10px 14px; overflow-y: auto; }
  #stab-events::-webkit-scrollbar { width: 3px; }
  #stab-events::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #yt-player { width: 100%; height: 100%; }
  #yt-container iframe { width: 100% !important; height: 100% !important; }
</style>
</head>
<body>

<main>
  <div class="video-section">
    <div class="video-wrapper">
      <!-- HLS/MP4 плеер -->
      <video id="video" controls style="display:none"></video>

      <!-- Iframe плеер (Кинопоиск / fbdomen / YouTube) -->
      <iframe id="iframe-player"
        style="display:none; width:100%; height:100%; border:none;"
        allowfullscreen
        allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
        referrerpolicy="no-referrer">
      </iframe>

      <div class="sync-overlay" id="sync-overlay">
        <div class="sync-spinner" id="sync-spinner"></div>
        <div class="sync-text" id="sync-text">Загрузка...</div>
      </div>

      <div class="pause-toast" id="pause-toast">
        <div class="pause-toast-icon" id="pause-toast-icon">⏸️</div>
        <div class="pause-toast-text" id="pause-toast-text">Кто-то поставил на паузу</div>
      </div>
    </div>

    <div class="info-bar">
      <span class="stream-label">Поток:</span>
      <span class="stream-url" id="stream-url-label">—</span>
    </div>
  </div>

  <div class="sidebar">
    <!-- Шапка сайдбара -->
    <div class="sidebar-section" style="display:flex; align-items:center; justify-content:space-between; padding:14px 16px;">
      <div class="logo" style="font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.06em;">WATCH<span style="color:var(--accent)">PARTY</span></div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="viewers-badge">
          <div class="viewers-dot"></div>
          <span id="viewers-count">1</span> зрит.
        </div>
        <button class="share-btn" id="share-btn" style="padding:6px 12px; font-size:12px;">🔗</button>
      </div>
    </div>
    <!-- Room info -->
    <div class="sidebar-section">
      <div class="sidebar-title">Комната</div>
      <div class="room-id-display" id="room-id-display">——</div>
      <div class="room-link-row">
        <input class="room-link-input" id="room-link-input" readonly />
        <button class="copy-link-btn" id="copy-link-btn">Копировать</button>
      </div>
    </div>

    <!-- Connection -->
    <div class="sidebar-section">
      <div class="sidebar-title">Соединение</div>
      <div class="conn-status connecting" id="conn-status">
        <div class="conn-dot"></div>
        <span id="conn-text">Подключение...</span>
      </div>
    </div>

    <!-- Chat + Events tabs -->
    <div class="sidebar-section chat-section">
      <div class="sidebar-tabs">
        <button class="stab active" data-stab="chat">💬 Чат</button>
        <button class="stab" data-stab="events">📋 События</button>
      </div>

      <!-- Chat -->
      <div class="stab-panel active" id="stab-chat">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" placeholder="Сообщение..." maxlength="300" autocomplete="off" />
          <button class="chat-send" id="chat-send">↑</button>
        </div>
      </div>

      <!-- Events -->
      <div class="stab-panel" id="stab-events">
        <ul class="event-log" id="event-log"></ul>
      </div>
    </div>
  </div>
</main>

<script>
// ── Room setup ──────────────────────────────────────────────────────────────
const roomId = "{{ROOM_ID}}";
const roomUrl = `${location.origin}/room/${roomId}`;

document.getElementById('room-id-display').textContent = roomId.toUpperCase();
document.getElementById('room-link-input').value = roomUrl;

// ── Helpers ─────────────────────────────────────────────────────────────────
function addEvent(icon, text) {
  const log = document.getElementById('event-log');
  const now = new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const li = document.createElement('li');
  li.className = 'event-item';
  li.innerHTML = `
    <span class="event-icon">${icon}</span>
    <div class="event-content">
      <div class="event-text">${text}</div>
      <div class="event-time">${now}</div>
    </div>`;
  log.insertBefore(li, log.firstChild);
  if (log.children.length > 50) log.removeChild(log.lastChild);
}

function showToast(icon, text, duration = 2000) {
  const t = document.getElementById('pause-toast');
  document.getElementById('pause-toast-icon').textContent = icon;
  document.getElementById('pause-toast-text').textContent = text;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

function setConnStatus(state, text) {
  const el = document.getElementById('conn-status');
  el.className = `conn-status ${state}`;
  document.getElementById('conn-text').textContent = text;
}

function copyLink(btn) {
  navigator.clipboard.writeText(roomUrl).then(() => {
    if (btn) {
      const orig = btn.innerHTML;
      btn.textContent = '✓ Скопировано';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
    }
    addEvent('📋', 'Ссылка скопирована в буфер обмена');
  }).catch(() => {
    // Fallback для браузеров без clipboard API
    prompt('Скопируйте ссылку:', roomUrl);
  });
}

document.getElementById('share-btn').addEventListener('click', function() { copyLink(this); });
document.getElementById('copy-link-btn').addEventListener('click', function() { copyLink(this); });

// ── Video player ─────────────────────────────────────────────────────────────
const video = document.getElementById('video');
const iframePlayer = document.getElementById('iframe-player');
let isSyncing = false;
let hlsLoaded = false;
let hlsInstance = null;
let playerMode = 'hls'; // 'hls' | 'iframe'

function showSyncOverlay(show, text) {
  document.getElementById('sync-overlay').classList.toggle('show', show);
  if (text) document.getElementById('sync-text').textContent = text;
  if (show) document.getElementById('sync-spinner').style.display = '';
}

function setSyncError(text) {
  document.getElementById('sync-overlay').classList.add('show');
  document.getElementById('sync-text').textContent = text;
  document.getElementById('sync-spinner').style.display = 'none';
}

// ── YouTube Sync режим ────────────────────────────────────────────────────────
function loadYtSync(videoId, watchUrl) {
  playerMode = 'yt_sync';
  video.style.display = 'none';
  iframePlayer.style.display = 'none';
  showSyncOverlay(false);
  hlsLoaded = true;

  const wrapper = document.querySelector('.video-wrapper');
  let ytScreen = document.getElementById('yt-sync-screen');
  if (!ytScreen) {
    ytScreen = document.createElement('div');
    ytScreen.id = 'yt-sync-screen';
    ytScreen.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#080810;color:#e8e8f0;text-align:center;padding:32px;';
    wrapper.appendChild(ytScreen);
  }

  const thumbUrl = 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';
  ytScreen.innerHTML = `
    <div style="position:relative;width:100%;max-width:480px">
      <img src="${thumbUrl}" style="width:100%;border-radius:12px;opacity:0.55" onerror="this.style.display='none'">
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
        <div style="width:64px;height:64px;background:rgba(255,0,0,0.85);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff">▶</div>
      </div>
    </div>
    <div>
      <div style="font-size:12px;color:#6a6a80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Режим синхронизации YouTube</div>
      <div style="font-size:13px;color:#6a6a80;max-width:360px;line-height:1.6">
        Откройте видео на YouTube и нажимайте Play/Pause —<br>все участники получат уведомление
      </div>
    </div>
    <a href="${watchUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#e8ff47;color:#080810;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;">
      ▶ Открыть на YouTube
    </a>
    <div id="yt-sync-status" style="font-size:12px;color:#6a6a80;min-height:18px;transition:all .3s"></div>
  `;

  addEvent('📺', 'YouTube режим синхронизации активен');
}

function ytSyncStatus(text, color) {
  const el = document.getElementById('yt-sync-status');
  if (el) { el.textContent = text; el.style.color = color || '#6a6a80'; }
}

function loadIframe(url) {
  playerMode = 'iframe';
  video.style.display = 'none';
  iframePlayer.style.display = 'block';
  showSyncOverlay(true, 'Загрузка плеера...');

  iframePlayer.src = url;
  iframePlayer.onload = () => {
    showSyncOverlay(false);
    hlsLoaded = true;
    addEvent('🎬', 'Плеер загружен');
  };

  // Fallback — убираем оверлей через 8 сек если onload не сработал
  setTimeout(() => {
    if (!hlsLoaded) {
      hlsLoaded = true;
      showSyncOverlay(false);
      addEvent('⚠️', 'Плеер загружен (таймаут)');
    }
  }, 8000);

  // Для iframe-плеера синхронизация через postMessage (PlayerJS протокол)
  window.addEventListener('message', (e) => {
    if (isSyncing) return;
    try {
      const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
      if (!data) return;

      // YouTube API ошибки (код 150/151/153 = embed запрещён владельцем)
      if (data.event === 'onError' || data.error) {
        const code = data.info || data.error;
        if (code === 150 || code === 151 || code === 153) {
          setSyncError('YouTube: владелец запретил встраивание этого видео.\nОткройте видео напрямую на YouTube.');
          addEvent('❌', 'YouTube embed запрещён владельцем (ошибка ' + code + ')');
        }
        return;
      }

      if (!data.event) return;
      if (data.event === 'pause') {
        send({ type: 'pause', current_time: data.currentTime || 0 });
        addEvent('⏸️', 'Вы поставили на паузу');
      } else if (data.event === 'play') {
        send({ type: 'play', current_time: data.currentTime || 0 });
        addEvent('▶️', 'Вы запустили воспроизведение');
      } else if (data.event === 'seek') {
        send({ type: 'seek', current_time: data.currentTime || 0 });
        addEvent('⏩', 'Вы перемотали — ' + formatTime(data.currentTime || 0));
      }
    } catch {}
  });
}

// Отправляем команду в iframe через postMessage (PlayerJS)
function iframeSend(method, value) {
  try {
    const msg = JSON.stringify({ api: 'DMCDN', method, value });
    iframePlayer.contentWindow?.postMessage(msg, '*');
    // Также пробуем PlayerJS формат
    const msg2 = JSON.stringify({ event: 'command', func: method, args: value !== undefined ? [value] : [] });
    iframePlayer.contentWindow?.postMessage(msg2, '*');
  } catch {}
}

// ── HLS режим ────────────────────────────────────────────────────────────────
function loadVideo(streamUrl, startTime, autoplay) {
  playerMode = 'hls';
  video.style.display = 'block';
  iframePlayer.style.display = 'none';
  showSyncOverlay(true, 'Загрузка потока...');

  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  const isM3U8 = /\.m3u8/i.test(streamUrl) || /hls/i.test(streamUrl);

  const fallbackTimer = setTimeout(() => {
    if (!hlsLoaded) {
      hlsLoaded = true;
      showSyncOverlay(false);
      addEvent('⚠️', 'Таймаут — нажмите Play вручную');
    }
  }, 15000);

  function onReady() {
    clearTimeout(fallbackTimer);
    if (startTime > 0) video.currentTime = startTime;
    hlsLoaded = true;
    showSyncOverlay(false);
    addEvent('🎬', 'Поток готов');
    if (autoplay) video.play().catch(() => addEvent('ℹ️', 'Нажмите Play для начала'));
  }

  if (isM3U8 && typeof Hls !== 'undefined' && Hls.isSupported()) {
    addEvent('📡', 'Инициализация HLS.js...');
    const hls = new Hls({ enableWorker: false, lowLatencyMode: false });
    hlsInstance = hls;
    hls.on(Hls.Events.ERROR, (event, data) => {
      addEvent('❌', 'HLS: ' + data.details);
      if (data.fatal) { setSyncError('Ошибка: ' + data.details); }
    });
    hls.on(Hls.Events.MANIFEST_PARSED, () => { addEvent('✅', 'Манифест загружен'); onReady(); });
    hls.loadSource(streamUrl);
    hls.attachMedia(video);
  } else {
    addEvent('📡', 'Нативный плеер...');
    video.src = streamUrl;
    video.onloadedmetadata = onReady;
    video.onerror = () => setSyncError('Ошибка загрузки видео');
  }
}

function loadNative(streamUrl, startTime, autoplay, fallbackTimer) {
  video.src = streamUrl;
  video.addEventListener('loadedmetadata', function onMeta() {
    video.removeEventListener('loadedmetadata', onMeta);
    if (startTime > 0) video.currentTime = startTime;
    hlsLoaded = true;
    clearTimeout(fallbackTimer);
    showSyncOverlay(false);
    addEvent('🎬', 'Видео готово');
    if (autoplay) video.play().catch(() => {});
  });
  video.addEventListener('error', function onErr() {
    video.removeEventListener('error', onErr);
    setSyncError('Ошибка загрузки видео');
    hlsLoaded = true;
  });
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null;
let reconnectTimeout = null;

function connect() {
  // location.protocol будет 'https:' на ngrok — используем wss://
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = proto + '://' + location.host + '/ws/' + roomId;
  ws = new WebSocket(wsUrl);
  setConnStatus('connecting', 'Подключение...');
  addEvent('🔌', 'WS: ' + wsUrl);

  ws.onopen = () => {
    setConnStatus('connected', 'Подключено');
    addEvent('🟢', 'Подключились к комнате');
    clearTimeout(reconnectTimeout);
    // Представляемся серверу
    send({ type: 'join', name: myName });
  };

  ws.onclose = () => {
    setConnStatus('disconnected', 'Отключено — переподключение...');
    addEvent('🔴', 'Соединение потеряно');
    reconnectTimeout = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setConnStatus('disconnected', 'Ошибка соединения');
  };

  ws.onmessage = (e) => {
    handleMessage(JSON.parse(e.data));
  };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// ── Message handler ───────────────────────────────────────────────────────────
function handleMessage(msg) {
  switch (msg.type) {

    case 'state': {
      document.getElementById('stream-url-label').textContent = msg.stream_url;
      if (msg.player_type === 'yt_sync') {
        loadYtSync(msg.youtube_video_id, msg.stream_url);
      } else if (msg.player_type === 'iframe') {
        loadIframe(msg.stream_url);
      } else {
        loadVideo(msg.stream_url, msg.current_time, msg.is_playing);
      }
      break;
    }

    case 'play': {
      if (!hlsLoaded) return;
      isSyncing = true;
      if (playerMode === 'yt_sync') {
        showToast('▶️', 'Кто-то нажал воспроизведение');
        addEvent('▶️', 'Воспроизведение — нажмите Play на YouTube');
        setTimeout(() => isSyncing = false, 500);
      } else if (playerMode === 'iframe') {
        iframeSend('play');
        setTimeout(() => isSyncing = false, 500);
      } else {
        video.currentTime = msg.current_time;
        video.play().catch(() => {}).finally(() => setTimeout(() => isSyncing = false, 300));
      }
      showToast('▶️', 'Кто-то нажал воспроизведение');
      addEvent('▶️', `Воспроизведение — ${formatTime(msg.current_time)}`);
      break;
    }

    case 'pause': {
      if (!hlsLoaded) return;
      isSyncing = true;
      if (playerMode === 'yt_sync') {
        showToast('⏸️', 'Кто-то поставил на паузу');
        addEvent('⏸️', 'Пауза — нажмите Pause на YouTube');
        setTimeout(() => isSyncing = false, 500);
      } else if (playerMode === 'iframe') {
        iframeSend('pause');
        setTimeout(() => isSyncing = false, 500);
      } else {
        video.currentTime = msg.current_time;
        video.pause();
        setTimeout(() => isSyncing = false, 300);
      }
      showToast('⏸️', 'Кто-то поставил на паузу');
      addEvent('⏸️', `Пауза — ${formatTime(msg.current_time)}`);
      break;
    }

    case 'seek': {
      if (!hlsLoaded) return;
      isSyncing = true;
      if (playerMode === 'yt_sync') {
        addEvent('⏩', `Перемотка — ${formatTime(msg.current_time)}`);
        setTimeout(() => isSyncing = false, 500);
      } else if (playerMode === 'iframe') {
        iframeSend('seek', msg.current_time);
        setTimeout(() => isSyncing = false, 500);
      } else {
        video.currentTime = msg.current_time;
        setTimeout(() => isSyncing = false, 400);
      }
      addEvent('⏩', `Перемотка — ${formatTime(msg.current_time)}`);
      break;
    }

    case 'viewers': {
      document.getElementById('viewers-count').textContent = msg.count;
      break;
    }

    case 'chat': {
      appendChatMessage({ name: msg.name, text: msg.text, time: msg.time });
      break;
    }

    case 'join':
    case 'leave': {
      appendChatMessage({ system: true, text: msg.text });
      break;
    }
  }
}

// ── Local video events → send to server ──────────────────────────────────────
video.addEventListener('play', () => {
  if (isSyncing || !hlsLoaded) return;
  send({ type: 'play', current_time: video.currentTime });
  addEvent('▶️', 'Вы запустили воспроизведение');
});

video.addEventListener('pause', () => {
  if (isSyncing || !hlsLoaded) return;
  send({ type: 'pause', current_time: video.currentTime });
  addEvent('⏸️', 'Вы поставили на паузу');
});

let seekTimer = null;
video.addEventListener('seeked', () => {
  if (isSyncing || !hlsLoaded) return;
  clearTimeout(seekTimer);
  seekTimer = setTimeout(() => {
    send({ type: 'seek', current_time: video.currentTime });
    addEvent('⏩', `Вы перемотали — ${formatTime(video.currentTime)}`);
  }, 300);
});

function formatTime(sec) {
  const s = Math.floor(sec);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}:${pad(m % 60)}:${pad(s % 60)}`;
  return `${m}:${pad(s % 60)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }

// ── Sidebar tabs ──────────────────────────────────────────────────────────────
document.querySelectorAll('.stab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.stab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('stab-' + btn.dataset.stab).classList.add('active');
    if (btn.dataset.stab === 'chat') {
      unreadCount = 0;
      btn.textContent = '💬 Чат';
    }
  });
});

// ── Chat ──────────────────────────────────────────────────────────────────────
// Генерируем случайное имя для пользователя (сохраняем в sessionStorage)
const myName = (() => {
  const saved = sessionStorage.getItem('wp_name');
  if (saved) return saved;
  const adjectives = ['Быстрый','Тихий','Яркий','Смелый','Умный','Бодрый','Тёплый','Чёткий'];
  const nouns      = ['Зритель','Гость','Друг','Человек','Волк','Лис','Орёл','Кот'];
  const name = adjectives[Math.floor(Math.random()*adjectives.length)] + ' ' +
               nouns[Math.floor(Math.random()*nouns.length)];
  sessionStorage.setItem('wp_name', name);
  return name;
})();

let unreadCount = 0;

function appendChatMessage({ name, text, time, system }) {
  const box = document.getElementById('chat-messages');
  const isOwn = name === myName;
  const isVisible = document.querySelector('.stab[data-stab="chat"]').classList.contains('active');

  if (system) {
    const div = document.createElement('div');
    div.className = 'chat-system';
    div.textContent = text;
    box.appendChild(div);
  } else {
    const t = new Date(time).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
    const div = document.createElement('div');
    div.className = 'chat-msg' + (isOwn ? ' own' : '');
    div.innerHTML = `
      <div class="chat-msg-meta">
        <span class="chat-name">${escHtml(name)}</span>
        <span>${t}</span>
      </div>
      <div class="chat-bubble">${escHtml(text)}</div>`;
    box.appendChild(div);

    if (!isOwn && !isVisible) {
      unreadCount++;
      document.querySelector('.stab[data-stab="chat"]').textContent = `💬 Чат (${unreadCount})`;
    }
  }

  // Прокрутка вниз
  box.scrollTop = box.scrollHeight;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sendChat(text) {
  text = text.trim();
  if (!text || !hlsLoaded && text.length === 0) return;
  send({ type: 'chat', name: myName, text, time: Date.now() });
  // Показываем своё сообщение сразу
  appendChatMessage({ name: myName, text, time: Date.now() });
}

// Кнопка и Enter
document.getElementById('chat-send').addEventListener('click', () => {
  const inp = document.getElementById('chat-input');
  sendChat(inp.value);
  inp.value = '';
});
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const inp = e.target;
    sendChat(inp.value);
    inp.value = '';
  }
});

// ── Start ─────────────────────────────────────────────────────────────────────
connect();
</script>
