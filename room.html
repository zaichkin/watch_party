<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Party — Комната</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<!-- HLS.js for .m3u8 streams -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #14141f;
    --border: rgba(255,255,255,0.07);
    --accent: #e8ff47;
    --accent2: #ff4f7b;
    --text: #e8e8f0;
    --muted: #6a6a80;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,8,16,0.8);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.04em;
  }
  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .viewers-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
  }
  .viewers-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .share-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    background: var(--accent);
    color: #080810;
    border: none;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .share-btn:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(232,255,71,0.3); }
  .share-btn.copied { background: #4f8fff; }

  /* ── Main layout ───────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
    height: calc(100vh - 57px);
  }

  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  }

  /* ── Video area ────────────────────────────────── */
  .video-section {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }

  .video-wrapper {
    position: relative;
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Sync overlay */
  .sync-overlay {
    position: absolute;
    inset: 0;
    background: rgba(8,8,16,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 10;
  }
  .sync-overlay.show { opacity: 1; pointer-events: all; }
  .sync-spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(232,255,71,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-text { font-size: 14px; color: var(--muted); }

  /* Pause overlay */
  .pause-toast {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(8,8,16,0.85);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 32px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 20;
    pointer-events: none;
  }
  .pause-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .pause-toast-icon { font-size: 32px; }
  .pause-toast-text { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* ── Info bar ──────────────────────────────────── */
  .info-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }
  .stream-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .stream-url {
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  /* ── Sidebar ───────────────────────────────────── */
  .sidebar {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* Room ID */
  .room-id-display {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 20px;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-align: center;
    margin-bottom: 10px;
  }

  .room-link-row {
    display: flex;
    gap: 8px;
  }
  .room-link-input {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: text;
    outline: none;
  }
  .copy-link-btn {
    padding: 8px 12px;
    background: rgba(232,255,71,0.1);
    border: 1px solid rgba(232,255,71,0.2);
    border-radius: 8px;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .copy-link-btn:hover { background: rgba(232,255,71,0.2); }

  /* Status log */
  .event-log {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 280px;
    overflow-y: auto;
  }
  .event-log::-webkit-scrollbar { width: 3px; }
  .event-log::-webkit-scrollbar-track { background: transparent; }
  .event-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .event-icon { font-size: 14px; flex-shrink: 0; }
  .event-content { flex: 1; }
  .event-text { font-size: 12px; color: var(--text); }
  .event-time { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .conn-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    transition: all 0.3s;
  }
  .conn-status.connected { background: rgba(71,255,150,0.06); color: #47ff96; }
  .conn-status.disconnected { background: rgba(255,79,123,0.06); color: var(--accent2); }
  .conn-status.connecting { background: rgba(232,255,71,0.06); color: var(--accent); }
  .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .conn-status.connected .conn-dot { animation: pulse 2s infinite; }
</style>
</head>
<body>

<header>
  <div class="logo">WATCH<span>PARTY</span></div>
  <div class="header-right">
    <div class="viewers-badge">
      <div class="viewers-dot"></div>
      <span id="viewers-count">1</span> зрителей
    </div>
    <button class="share-btn" onclick="copyLink(this)">
      <span>🔗</span> Поделиться
    </button>
  </div>
</header>

<main>
  <div class="video-section">
    <div class="video-wrapper">
      <video id="video" controls></video>

      <div class="sync-overlay" id="sync-overlay">
        <div class="sync-spinner"></div>
        <div class="sync-text">Синхронизация...</div>
      </div>

      <div class="pause-toast" id="pause-toast">
        <div class="pause-toast-icon" id="pause-toast-icon">⏸️</div>
        <div class="pause-toast-text" id="pause-toast-text">Кто-то поставил на паузу</div>
      </div>
    </div>

    <div class="info-bar">
      <span class="stream-label">Поток:</span>
      <span class="stream-url" id="stream-url-label">—</span>
    </div>
  </div>

  <div class="sidebar">
    <!-- Room info -->
    <div class="sidebar-section">
      <div class="sidebar-title">Комната</div>
      <div class="room-id-display" id="room-id-display">——</div>
      <div class="room-link-row">
        <input class="room-link-input" id="room-link-input" readonly />
        <button class="copy-link-btn" onclick="copyLink(null)">Копировать</button>
      </div>
    </div>

    <!-- Connection -->
    <div class="sidebar-section">
      <div class="sidebar-title">Соединение</div>
      <div class="conn-status connecting" id="conn-status">
        <div class="conn-dot"></div>
        <span id="conn-text">Подключение...</span>
      </div>
    </div>

    <!-- Event log -->
    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-title">События</div>
      <ul class="event-log" id="event-log"></ul>
    </div>
  </div>
</main>

<script>
// ── Room setup ──────────────────────────────────────────────────────────────
const roomId = location.pathname.split('/').pop();
const roomUrl = location.href;

document.getElementById('room-id-display').textContent = roomId.toUpperCase();
document.getElementById('room-link-input').value = roomUrl;

// ── Helpers ─────────────────────────────────────────────────────────────────
function addEvent(icon, text) {
  const log = document.getElementById('event-log');
  const now = new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const li = document.createElement('li');
  li.className = 'event-item';
  li.innerHTML = `
    <span class="event-icon">${icon}</span>
    <div class="event-content">
      <div class="event-text">${text}</div>
      <div class="event-time">${now}</div>
    </div>`;
  log.insertBefore(li, log.firstChild);
  if (log.children.length > 50) log.removeChild(log.lastChild);
}

function showToast(icon, text, duration = 2000) {
  const t = document.getElementById('pause-toast');
  document.getElementById('pause-toast-icon').textContent = icon;
  document.getElementById('pause-toast-text').textContent = text;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

function setConnStatus(state, text) {
  const el = document.getElementById('conn-status');
  el.className = `conn-status ${state}`;
  document.getElementById('conn-text').textContent = text;
}

function copyLink(btn) {
  navigator.clipboard.writeText(roomUrl).then(() => {
    if (btn) { btn.textContent = '✓ Скопировано'; btn.classList.add('copied'); setTimeout(() => { btn.innerHTML = '<span>🔗</span> Поделиться'; btn.classList.remove('copied'); }, 2000); }
    addEvent('📋', 'Ссылка скопирована в буфер обмена');
  });
}

// ── Video player ─────────────────────────────────────────────────────────────
const video = document.getElementById('video');
let isSyncing = false; // suppress echo events during remote control

function showSyncOverlay(show) {
  document.getElementById('sync-overlay').classList.toggle('show', show);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null;
let reconnectTimeout = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${roomId}`);
  setConnStatus('connecting', 'Подключение...');

  ws.onopen = () => {
    setConnStatus('connected', 'Подключено');
    addEvent('🟢', 'Подключились к комнате');
    clearTimeout(reconnectTimeout);
  };

  ws.onclose = () => {
    setConnStatus('disconnected', 'Отключено — переподключение...');
    addEvent('🔴', 'Соединение потеряно');
    reconnectTimeout = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setConnStatus('disconnected', 'Ошибка соединения');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// ── Message handler ───────────────────────────────────────────────────────────
let hlsLoaded = false;

function handleMessage(msg) {
  switch (msg.type) {

    case 'state': {
      // Initial state: load stream and seek to current_time
      document.getElementById('stream-url-label').textContent = msg.stream_url;
      showSyncOverlay(true);

      if (Hls.isSupported() && msg.stream_url.includes('.m3u8')) {
        const hls = new Hls();
        hls.loadSource(msg.stream_url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.currentTime = msg.current_time;
          if (msg.is_playing) video.play().catch(() => {});
          showSyncOverlay(false);
          hlsLoaded = true;
          addEvent('🎬', 'Поток загружен');
        });
      } else {
        // Native video (mp4, webm, etc.)
        video.src = msg.stream_url;
        video.onloadedmetadata = () => {
          video.currentTime = msg.current_time;
          if (msg.is_playing) video.play().catch(() => {});
          showSyncOverlay(false);
          hlsLoaded = true;
          addEvent('🎬', 'Видео загружено');
        };
      }
      break;
    }

    case 'play': {
      isSyncing = true;
      video.currentTime = msg.current_time;
      video.play().catch(() => {}).finally(() => setTimeout(() => isSyncing = false, 200));
      showToast('▶️', 'Кто-то нажал воспроизведение');
      addEvent('▶️', `Воспроизведение — ${formatTime(msg.current_time)}`);
      break;
    }

    case 'pause': {
      isSyncing = true;
      video.currentTime = msg.current_time;
      video.pause();
      setTimeout(() => isSyncing = false, 200);
      showToast('⏸️', 'Кто-то поставил на паузу');
      addEvent('⏸️', `Пауза — ${formatTime(msg.current_time)}`);
      break;
    }

    case 'seek': {
      isSyncing = true;
      video.currentTime = msg.current_time;
      setTimeout(() => isSyncing = false, 300);
      addEvent('⏩', `Перемотка — ${formatTime(msg.current_time)}`);
      break;
    }

    case 'viewers': {
      document.getElementById('viewers-count').textContent = msg.count;
      break;
    }
  }
}

// ── Local video events → send to server ──────────────────────────────────────
video.addEventListener('play', () => {
  if (isSyncing || !hlsLoaded) return;
  send({ type: 'play', current_time: video.currentTime });
  addEvent('▶️', `Вы запустили воспроизведение`);
});

video.addEventListener('pause', () => {
  if (isSyncing || !hlsLoaded) return;
  send({ type: 'pause', current_time: video.currentTime });
  addEvent('⏸️', `Вы поставили на паузу`);
});

let seekTimer = null;
video.addEventListener('seeked', () => {
  if (isSyncing || !hlsLoaded) return;
  clearTimeout(seekTimer);
  seekTimer = setTimeout(() => {
    send({ type: 'seek', current_time: video.currentTime });
    addEvent('⏩', `Вы перемотали — ${formatTime(video.currentTime)}`);
  }, 300);
});

function formatTime(sec) {
  const s = Math.floor(sec);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}:${pad(m % 60)}:${pad(s % 60)}`;
  return `${m}:${pad(s % 60)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }

// ── Start ─────────────────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
